<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heisenberg Uncertainty Principle</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Heisenberg Uncertainty Principle</h1>
    <p>Enter the uncertainty in position (ΔX/ΔP):</p>
    <div class="input-group">
      <input type="number" id="deltaX" placeholder="Enter ΔX in meters">
      <input type="number" id="deltaP" placeholder="Enter ΔP in kg·m/s">
    </div>
    <div class="button-group">
      <button onclick="calculatedeltapUncertainty()">Calculate for ΔP</button>
      <button onclick="calculatedeltaxUncertainty()">Calculate for ΔX</button>
    </div> 
    <div class="output">
        <input style="width: 170px;
        height: 40px; display: none;
        border-radius: 10px;
        background-color: aqua;float: right;
        text-align: center;
        font-size: 20px;
        align-content: center;
        justify-content: center;
        margin-right: 10px; margin-top:10px;
        position: relative;
        top: 50px;
        left: 10px; "
        type="text" id="output" >
        <section style="width: 100%;display: flex; align-content:justify;
          text-align:left;">
              <p style="font-size: 20px; width: 90%;" id="result"></p>
              <section style="width: 20%;"></section>
        </section>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
